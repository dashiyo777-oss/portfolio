    /* ── SECTION TITLE ── */

    .td-num { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--gray); width:2rem; text-align:center; }
    .td-party { font-family:'Noto Serif JP',serif; font-size:0.88rem; font-weight:600; white-space:nowrap; }
    .party-badge { display:inline-block; padding:0.15rem 0.55rem; border-radius:3px; font-size:0.75rem; font-weight:500; color:#fff; }
    .td-count { font-size:0.72rem; color:var(--gray); width:4rem; text-align:right; white-space:nowrap; }

    .bar-bg { background:rgba(255,255,255,0.06); border-radius:2px; height:10px; overflow:hidden; }

    .rank-dist { display:flex; gap:2px; flex-wrap:wrap; }
    .rd-pill {
      font-size:0.58rem; padding:0.08rem 0.28rem; border-radius:2px;

    /* ── AXES SECTION ── */
    .axes-section { margin-top:2.5rem; }
    .axes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:1.2rem; }
    .party-card {
      background:var(--card); border:1px solid var(--border); border-radius:8px;
      padding:1.2rem; cursor:pointer; transition:border-color 0.2s;
    }
    .party-card:hover { border-color:rgba(74,144,226,0.45); }
    .party-card.selected { border-color:var(--blue); background:rgba(91,160,224,0.08); }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.9rem; }
    .card-score { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600; }
    .axes-bars { display:flex; flex-direction:column; gap:0.35rem; }
    .ax-row { display:grid; grid-template-columns:7rem 1fr 2rem; align-items:center; gap:0.5rem; }
    .ax-label { font-size:0.65rem; color:var(--gray); font-family:'Noto Serif JP',serif; text-align:right; }
    .ax-bar-bg { background:rgba(255,255,255,0.06); border-radius:2px; height:7px; overflow:hidden; }

    .ax-val { font-size:0.7rem; color:var(--gray); text-align:right; font-family:'Montserrat',sans-serif; }

    <div class="axes-grid" id="axes-grid"></div>
  </div>

<script src="data.js"></script>
<script>
const AXES_JA = ['国民生活改善','経済・財政','安全保障','政策実現力','説明責任','長期国益','公共性','政治倫理'];

const PARTY_COLORS = {
  '自民党':'#c8102e','立憲民主党':'#003f8a','日本維新の会':'#f2a100',
  '公明党':'#9b59b6','国民民主党':'#7ac143','日本共産党':'#e4002b',
  'れいわ新選組':'#ff69b4','参政党':'#ff8c00','無所属':'#808080',
  '中道改革連合':'#2196f3','チームみらい':'#00bcd4','社民党':'#e91e63',
  '日本保守党':'#795548','沖縄社会大衆党':'#009688','減税日本・ゆうこく連合':'#607d8b',
  'NHKから国民を守る党':'#9e9e9e'
};

function rankColor(r) {
  if (!r) return '#6878a0';
  if (r.startsWith('S'))  return '#f5c842';
  if (r.startsWith('A'))  return '#4ac776';
  if (r.startsWith('B'))  return '#4a8fd4';
  if (r.startsWith('C'))  return '#f0a030';
  return '#e6384f';
}
function scoreColor(t) {
  if (t >= 80) return '#4ac776';
  if (t >= 70) return '#4a8fd4';
  if (t >= 60) return '#f0a030';
  return '#e6384f';
}

function buildStats(chamber) {
  const src = chamber === 'all'
    ? POLITICIANS.filter(p => p.survey === '評価済')
    : POLITICIANS.filter(p => p.survey === '評価済' && p.chamber === chamber);

  const map = {};
  src.forEach(p => {
    if (!map[p.party]) map[p.party] = { count:0, totalSum:0, axes:[0,0,0,0,0,0,0,0], ranks:{} };
    const d = map[p.party];
    d.count++;
    d.totalSum += p.total;
    p.axes.forEach((v,i) => d.axes[i] += v);
    d.ranks[p.rank] = (d.ranks[p.rank]||0) + 1;
  });

  return Object.entries(map)
    .map(([name, d]) => ({
      name,
      count: d.count,
      avg: Math.round(d.totalSum / d.count),
      axes: d.axes.map(v => Math.round(v / d.count * 10) / 10),
      ranks: d.ranks
    }))
    .filter(p => p.count >= 1)
    .sort((a,b) => b.avg - a.avg);
}

const RANK_ORDER = ['S','A+','A','A-','B+','B','B-','C+','C','C-','D'];

function renderRankDist(ranks, count) {
  return RANK_ORDER
    .filter(r => ranks[r])
    .map(r => `<span class="rd-pill" style="background:${rankColor(r)}22;color:${rankColor(r)};border:1px solid ${rankColor(r)}44">${r}:${ranks[r]}</span>`)
    .join('');
}

let currentChamber = 'all';

function renderTable(data) {
  const max = data[0]?.avg || 100;
  const table = document.getElementById('rank-table');
  table.innerHTML = data.map((d, i) => {
    const pc = PARTY_COLORS[d.name] || '#666';
    const sc = scoreColor(d.avg);
    const pct = Math.round(d.avg / 100 * 100);
    return `<tr>
      <td class="td-num">${i+1}</td>
      <td class="td-party">
        <span class="party-badge" style="background:${pc}">${d.name}</span>
      </td>
      <td class="td-count">${d.count}人</td>
      <td class="td-bar">
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%;background:${sc}"></div>
        </div>
      </td>
      <td class="td-score" style="color:${sc}">${d.avg}</td>
      <td class="td-rank-dist"><div class="rank-dist">${renderRankDist(d.ranks, d.count)}</div></td>
    </tr>`;
  }).join('');

  const total = data.reduce((s,d) => s+d.count, 0);
  document.getElementById('rank-note').textContent =
    `※ 評価済み ${total}名（survey:"評価済"）を集計。平均は整数四捨五入。`;
}

function renderAxes(data) {
  const grid = document.getElementById('axes-grid');
  grid.innerHTML = data.filter(d => d.count >= 3).map(d => {
    const pc = PARTY_COLORS[d.name] || '#666';
    const sc = scoreColor(d.avg);
    const maxAx = 5;
    const axRows = AXES_JA.map((label, i) => {
      const val = d.axes[i];
      const pct = Math.round(val / maxAx * 100);
      const col = val >= 4 ? '#4ac776' : val >= 3 ? '#4a8fd4' : val >= 2 ? '#f0a030' : '#e6384f';
      return `<div class="ax-row">
        <div class="ax-label">${label}</div>
        <div class="ax-bar-bg"><div class="ax-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="ax-val">${val}</div>
      </div>`;
    }).join('');
    return `<div class="party-card">
      <div class="card-header">
        <span class="party-badge" style="background:${pc};font-size:0.8rem;padding:0.2rem 0.65rem">${d.name}</span>
        <div>
          <div class="card-score" style="color:${sc}">${d.avg}</div>
          <div style="font-size:0.62rem;color:var(--gray);text-align:right">${d.count}名</div>
        </div>
      </div>
      <div class="axes-bars">${axRows}</div>
    </div>`;
  }).join('');
}

function render(chamber) {
  const data = buildStats(chamber);
  renderTable(data);
  renderAxes(data);
}

// Tab click
document.getElementById('chamber-tabs').querySelectorAll('.tab-pill').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab-pill').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentChamber = tab.dataset.chamber;
    render(currentChamber);
  });
});

render('all');
</script>
